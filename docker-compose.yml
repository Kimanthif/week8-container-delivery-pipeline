services:
  kk-payments:
    build:
      context: ./app
      dockerfile: Dockerfile.production
    container_name: kk-payments
    ports:
      - "4001:3000"
    environment:
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3