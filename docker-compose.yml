services:
  kk-payments:
    build:
      context: ./app
      dockerfile: Dockerfile.production
    container_name: kk-payments
    ports:
      - "4001:3000"
    environment:
      - PORT=3000
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s